dbt_projet:
  target: dev
  outputs:
    # Configuration locale (Docker PostgreSQL)
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST') }}"
      user: "{{ env_var('DB_USER') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      port: "{{ env_var('DB_PORT') | int }}"
      dbname: "{{ env_var('DB_NAME') }}"
      schema: projet_8
      threads: 4
      keepalives_idle: 0

    # Configuration AWS RDS
    aws:
      type: postgres
      host: "{{ env_var('DBT_RDS_HOST') }}"
      user: "{{ env_var('DBT_RDS_USER') }}"
      password: "{{ env_var('DBT_RDS_PASSWORD') }}"
      port: "{{ env_var('DBT_RDS_PORT') | int }}"
      dbname: "{{ env_var('DBT_RDS_DBNAME') }}"
      schema: projet_8
      threads: 4
      keepalives_idle: 0